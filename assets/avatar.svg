<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a66c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0050a0;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#avatarGrad)" />
  <!-- Body silhouette -->
  <ellipse cx="200" cy="320" rx="110" ry="80" fill="rgba(255,255,255,0.2)" clip-path="url(#circle)"/>
  <!-- Head silhouette -->
  <circle cx="200" cy="165" r="70" fill="rgba(255,255,255,0.9)" />
  <!-- Initials -->
  <text x="200" y="192" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#0a66c2" text-anchor="middle" dominant-baseline="middle">PN</text>
</svg>
