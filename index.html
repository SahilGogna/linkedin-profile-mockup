<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priya Nair – LinkedIn Profile</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- React 18 + ReactDOM + Babel Standalone (no build step) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Guide data (phase 2) -->
  <script src="guideData.js"></script>
  <!-- Profile data -->
  <script src="profileData.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ════════════════════════════════════════════
       GUIDE BADGE  (the ? circle)
    ════════════════════════════════════════════ */
    function GuideBadge({ sectionKey, onOpen, className = '' }) {
      return (
        <button
          className={`guide-badge ${className}`}
          title="View tips"
          onClick={e => { e.stopPropagation(); onOpen(sectionKey); }}
        >
          ?
        </button>
      );
    }

    /* ════════════════════════════════════════════
       GUIDE DRAWER
    ════════════════════════════════════════════ */
    function renderBlock(block, i) {
      switch (block.type) {
        case 'heading':
          return <p key={i} className="guide-block-heading">{block.text}</p>;
        case 'subheading':
          return <p key={i} className="guide-block-subheading">{block.text}</p>;
        case 'text':
          return <p key={i} className="guide-block-text">{block.text}</p>;
        case 'bullet-list':
          return (
            <ul key={i} className="guide-list">
              {block.items.map((it, j) => <li key={j}>{it}</li>)}
            </ul>
          );
        case 'do-list':
          return (
            <ul key={i} className="guide-list guide-list-do">
              {block.items.map((it, j) => <li key={j}>{it}</li>)}
            </ul>
          );
        case 'dont-list':
          return (
            <ul key={i} className="guide-list guide-list-dont">
              {block.items.map((it, j) => <li key={j}>{it}</li>)}
            </ul>
          );
        case 'numbered-list':
          return (
            <ol key={i} className="guide-numbered-list">
              {block.items.map((it, j) => <li key={j}>{it}</li>)}
            </ol>
          );
        case 'formula':
          return <div key={i} className="guide-formula">{block.text}</div>;
        case 'code-block':
          return <pre key={i} className="guide-code-block">{block.text}</pre>;
        case 'example-list':
          return (
            <ul key={i} className="guide-example-list">
              {block.items.map((it, j) => <li key={j}>{it}</li>)}
            </ul>
          );
        case 'pro-tip':
          return (
            <div key={i} className="guide-pro-tip">
              <span className="guide-pro-tip-icon">💡</span>
              <p className="guide-pro-tip-text"><strong>Pro Tip:</strong> {block.text}</p>
            </div>
          );
        default:
          return null;
      }
    }

    function GuideDrawer({ sectionKey, onClose }) {
      useEffect(() => {
        const onKey = e => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [onClose]);

      if (!sectionKey) return null;
      const guide = guideData[sectionKey];
      if (!guide) return null;

      return (
        <>
          <div className="guide-overlay" onClick={onClose} />
          <div className="guide-drawer">
            <div className="guide-drawer-accent" style={{ background: guide.accentColor }} />
            <div className="guide-drawer-header">
              <span className="guide-drawer-icon">{guide.icon}</span>
              <h2 className="guide-drawer-title">{guide.title}</h2>
              <button className="guide-drawer-close" onClick={onClose}>✕</button>
            </div>
            <div className="guide-drawer-body">
              {guide.blocks.map((block, i) => renderBlock(block, i))}
            </div>
          </div>
        </>
      );
    }

    /* ════════════════════════════════════════════
       HELPER COMPONENTS
    ════════════════════════════════════════════ */

    function InitialsAvatar({ name, initials, color, size = 44, shape = 'square' }) {
      const letters = initials || (name || '').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const fontSize = size * 0.36;
      return (
        <div
          className={`initials-avatar ${shape === 'circle' ? 'rounded' : 'square'}`}
          style={{ width: size, height: size, background: color, fontSize }}
        >
          {letters}
        </div>
      );
    }

    function ShowMoreText({ text, limit = 220 }) {
      const [expanded, setExpanded] = useState(false);
      const isLong = text.length > limit;
      const displayed = expanded ? text : text.slice(0, limit);
      return (
        <div>
          <p className="about-text">
            {displayed}{!expanded && isLong && '…'}
          </p>
          {isLong && (
            <button className="show-more-btn" onClick={() => setExpanded(!expanded)}>
              {expanded ? 'see less' : '…see more'}
            </button>
          )}
        </div>
      );
    }

    function SectionHeaderRow({ title, guideKey, onGuideOpen }) {
      return (
        <div className="section-header-row">
          <h2 className="section-title">{title}</h2>
          {guideKey && onGuideOpen && (
            <GuideBadge sectionKey={guideKey} onOpen={onGuideOpen} />
          )}
        </div>
      );
    }

    /* ════════════════════════════════════════════
       PROFILE HEADER
    ════════════════════════════════════════════ */

    function ProfileHeader({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="profile-header-card">
          {/* Banner — badge floats top-right */}
          <div className="banner-container">
            <img
              className="banner-img"
              src={data.banner}
              alt="Profile banner"
              onError={e => { e.target.style.display = 'none'; }}
            />
            <GuideBadge sectionKey="banner" onOpen={onGuideOpen} className="guide-badge-float banner-guide-badge" />
          </div>

          <div className="profile-header-body">
            {/* Avatar — badge floats on corner */}
            <div className="avatar-wrapper">
              <div className={`avatar-ring ${data.openToWork ? 'open-to-work' : ''}`}>
                <div className="avatar-circle" style={{ background: '#0a66c2' }}>
                  <img
                    src={data.avatar}
                    alt={data.name}
                    onError={e => { e.target.style.display = 'none'; e.target.parentNode.innerHTML = '<span style="font-size:42px;font-weight:700;color:#fff">PN</span>'; }}
                  />
                </div>
              </div>
              <GuideBadge sectionKey="photo" onOpen={onGuideOpen} className="guide-badge-float photo-guide-badge" />
            </div>

            {/* Name + pronouns + degree */}
            <div className="profile-name-row">
              <span className="profile-name">{data.name}</span>
              <span className="profile-pronouns">({data.pronouns})</span>
              <span className="degree-badge">{data.degree}</span>
            </div>

            {/* Headline + badge inline */}
            <div className="guide-inline-row" style={{ marginBottom: '4px' }}>
              <p className="profile-headline" style={{ margin: 0 }}>{data.headline}</p>
              <GuideBadge sectionKey="headline" onOpen={onGuideOpen} />
            </div>

            {/* Location + badge inline */}
            <div className="guide-inline-row" style={{ marginBottom: '4px' }}>
              <p className="profile-location" style={{ margin: 0 }}>
                {data.location} · <span className="profile-contact-link">{data.contactInfo}</span>
              </p>
              <GuideBadge sectionKey="location" onOpen={onGuideOpen} />
            </div>

            {/* Stats */}
            <div className="profile-stats">
              <div className="profile-stat">
                {data.followers.toLocaleString()} <span>followers</span>
              </div>
              <div className="profile-stat">
                {data.connections} <span>connections</span>
              </div>
            </div>

            {/* Mutual connections */}
            {data.mutualConnections && data.mutualConnections.length > 0 && (
              <div className="mutual-connections">
                <div className="mutual-avatars">
                  {data.mutualConnections.map((mc, i) => (
                    <div key={i} className="mutual-avatar" style={{ background: mc.color }}>
                      {mc.initials}
                    </div>
                  ))}
                </div>
                <span>
                  {data.mutualConnections.map(mc => mc.name).join(' and ')} are mutual connections
                </span>
              </div>
            )}

            {/* Action buttons — OTW badge sits right after the Open to button */}
            <div className="action-buttons">
              {isOwnProfile ? (
                <>
                  <button className="btn btn-green">Open to</button>
                  <GuideBadge sectionKey="openToWork" onOpen={onGuideOpen} />
                  <button className="btn btn-outline">Add section</button>
                  <button className="btn btn-ghost">Enhance profile</button>
                  <button className="btn btn-ghost">Resources ▾</button>
                </>
              ) : (
                <>
                  <button className="btn btn-primary">Connect</button>
                  <button className="btn btn-outline">Message</button>
                  <button className="btn btn-outline">Follow</button>
                  <button className="btn btn-ghost">More ▾</button>
                </>
              )}
            </div>

            {/* Current company + school */}
            <div className="header-sidebar-info">
              {data.currentCompany && (
                <div className="sidebar-info-row">
                  <InitialsAvatar
                    initials={data.currentCompany.initials}
                    color={data.currentCompany.color}
                    size={22}
                    shape="square"
                  />
                  <span className="info-label">{data.currentCompany.name}</span>
                </div>
              )}
              {data.currentSchool && (
                <div className="sidebar-info-row">
                  <InitialsAvatar
                    initials={data.currentSchool.initials}
                    color={data.currentSchool.color}
                    size={22}
                    shape="square"
                  />
                  <span className="info-label">{data.currentSchool.name}</span>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       ABOUT SECTION
    ════════════════════════════════════════════ */

    function AboutSection({ data, isOwnProfile, onGuideOpen }) {
      const [expanded, setExpanded] = useState(false);
      const paragraphs = data.text.trim().split('\n\n');
      const previewText = paragraphs[0];
      const hasMore = paragraphs.length > 1;

      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="About" guideKey="about" onGuideOpen={onGuideOpen} />

            {expanded ? (
              <div className="about-text">
                {paragraphs.map((p, i) => (
                  <p key={i} style={{ marginBottom: i < paragraphs.length - 1 ? '12px' : 0 }}>{p}</p>
                ))}
              </div>
            ) : (
              <p className="about-text">{previewText}{hasMore ? '…' : ''}</p>
            )}

            {hasMore && (
              <button className="show-more-btn" onClick={() => setExpanded(!expanded)}>
                {expanded ? 'see less' : '…see more'}
              </button>
            )}

            {/* Top Skills sub-card */}
            <div className="top-skills-card">
              <div className="top-skills-inner">
                <div className="top-skills-title">🔑 Top skills</div>
                <div className="top-skills-list">{data.topSkills.join(' · ')}</div>
              </div>
              <div className="top-skills-arrow">›</div>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       FEATURED SECTION
    ════════════════════════════════════════════ */

    function FeaturedSection({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Featured" guideKey="featured" onGuideOpen={onGuideOpen} />
            <div className="featured-scroll">
              {data.map((item, i) => (
                <div key={i} className="featured-card" onClick={() => window.open(item.url, '_blank')}>
                  <div className="featured-thumb">{item.icon}</div>
                  <div className="featured-meta">
                    <div className="featured-type">{item.type}</div>
                    <div className="featured-title">{item.title}</div>
                    <div className="featured-subtitle">{item.subtitle}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       ACTIVITY SECTION
    ════════════════════════════════════════════ */

    function ActivitySection({ data, header, isOwnProfile, onGuideOpen }) {
      const [activeTab, setActiveTab] = useState('Posts');
      const tabs = ['Posts', 'Comments', 'Videos', 'Images'];
      const authorName  = header.name;
      const authorTitle = header.headline.split('|')[0].trim();

      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Activity" isOwnProfile={false} />
            <p className="activity-followers">{header.followers.toLocaleString()} followers</p>

            <div className="activity-tabs">
              {tabs.map(tab => (
                <div key={tab} className="activity-tab-wrapper">
                  <button
                    className={`activity-tab${activeTab === tab ? ' active' : ''}`}
                    onClick={() => setActiveTab(tab)}
                  >
                    {tab}
                  </button>
                  {tab === 'Posts' && onGuideOpen && (
                    <GuideBadge sectionKey="activityPosts" onOpen={onGuideOpen} />
                  )}
                  {tab === 'Comments' && onGuideOpen && (
                    <GuideBadge sectionKey="activityComments" onOpen={onGuideOpen} />
                  )}
                </div>
              ))}
            </div>

            {activeTab === 'Posts' && (
              <div className="activity-posts-grid">
                {data.posts.map((post, i) => (
                  <div key={i} className="activity-post-card">
                    <div className="activity-post-header">
                      <InitialsAvatar initials="PN" color="#0a66c2" size={32} shape="circle" />
                      <div className="activity-post-author-block">
                        <div className="activity-post-author-name">{authorName}</div>
                        <div className="activity-post-author-meta">{authorTitle}</div>
                      </div>
                      <span className="activity-post-time">{post.timeAgo}</span>
                    </div>
                    <p className="activity-post-text">{post.content}</p>
                    <div className="activity-post-image" style={{ background: post.imageBg }}>
                      {post.imageEmoji}
                    </div>
                    <div className="activity-post-reactions">
                      <span>❤️ {post.reactions}</span>
                      <span>💬 {post.comments}</span>
                      <span className="reaction-share">↗</span>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'Comments' && (
              <div className="activity-comments-list">
                {data.comments.map((c, i) => (
                  <div key={i} className="activity-comment-item">
                    <p className="activity-comment-meta">
                      <strong>{authorName}</strong> {c.action} · {c.timeAgo}
                    </p>
                    <p className="activity-comment-text">{c.text}</p>
                  </div>
                ))}
              </div>
            )}

            {(activeTab === 'Videos' || activeTab === 'Images') && (
              <p className="activity-empty">No {activeTab.toLowerCase()} to show yet.</p>
            )}

            <div className="section-footer">
              <button className="section-footer-btn">Show all activity →</button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       EXPERIENCE SECTION
    ════════════════════════════════════════════ */

    function ExperienceSection({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Experience" guideKey="experience" onGuideOpen={onGuideOpen} />
            <div className="experience-list">
              {data.map((exp, i) => (
                <div key={i} className="experience-item">
                  <div className="experience-logo">
                    <InitialsAvatar initials={exp.initials} color={exp.color} size={48} shape="square" />
                  </div>
                  <div>
                    <div className="exp-title">{exp.title}</div>
                    <div className="exp-company">{exp.company} · {exp.type}</div>
                    <div className="exp-meta">
                      {exp.start} – {exp.end} · {exp.duration}<br />
                      {exp.location}
                    </div>
                    <ul className="exp-bullets">
                      {exp.bullets.map((b, j) => (
                        <li key={j}>{b}</li>
                      ))}
                    </ul>
                  </div>
                </div>
              ))}
            </div>
            <div className="section-footer">
              <button className="section-footer-btn">Show all experience →</button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       EDUCATION SECTION
    ════════════════════════════════════════════ */

    function EducationSection({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Education" guideKey="education" onGuideOpen={onGuideOpen} />
            <div className="education-list">
              {data.map((edu, i) => (
                <div key={i} className="education-item">
                  <InitialsAvatar initials={edu.initials} color={edu.color} size={48} shape="square" />
                  <div>
                    <div className="edu-school">{edu.school}</div>
                    <div className="edu-degree">{edu.degree}, {edu.field}</div>
                    <div className="edu-meta">{edu.start} – {edu.end}</div>
                    {edu.gpa && (
                      <div className="edu-detail">
                        <strong>Grade:</strong> {edu.gpa} · {edu.honours}
                      </div>
                    )}
                    {edu.coursework && edu.coursework.length > 0 && (
                      <div className="edu-detail">
                        <strong>Relevant coursework:</strong> {edu.coursework.join(', ')}
                      </div>
                    )}
                    {edu.activities && (
                      <div className="edu-detail mt-4">
                        <strong>Activities:</strong> {edu.activities}
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       CERTIFICATIONS SECTION
    ════════════════════════════════════════════ */

    function CertificationsSection({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Licenses & Certifications" guideKey="certifications" onGuideOpen={onGuideOpen} />
            <div className="cert-list">
              {data.map((cert, i) => (
                <div key={i} className="cert-item">
                  <InitialsAvatar initials={cert.initials} color={cert.color} size={48} shape="square" />
                  <div>
                    <div className="cert-name">{cert.name}</div>
                    <div className="cert-issuer">{cert.issuer}</div>
                    <div className="cert-meta">
                      Issued {cert.issueDate} · Credential ID: {cert.credentialId}
                    </div>
                    <button
                      className="btn-credential"
                      onClick={() => window.open(cert.credentialUrl, '_blank')}
                    >
                      🔗 Show credential
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       PROJECTS SECTION
    ════════════════════════════════════════════ */

    function ProjectItem({ project }) {
      const [expanded, setExpanded] = useState(false);
      const limit = 160;
      const isLong = project.description.length > limit;
      return (
        <div className="project-item">
          <div className="project-title">{project.title}</div>
          <div className="project-dates">{project.start} – {project.end}</div>
          <div className="project-associated">
            <InitialsAvatar
              initials={project.associatedInitials}
              color={project.associatedColor}
              size={24}
              shape="circle"
            />
            <span>Associated with {project.associatedWith}</span>
          </div>
          <button
            className="btn-show-project"
            onClick={() => window.open(project.url, '_blank')}
          >
            Show project ↗
          </button>
          <p className="project-description">
            {expanded ? project.description : project.description.slice(0, limit) + (isLong ? '…' : '')}
          </p>
          {isLong && (
            <button className="show-more-btn" onClick={() => setExpanded(!expanded)}>
              {expanded ? 'see less' : '…see more'}
            </button>
          )}
          {project.contributors.length > 0 && (
            <div style={{ marginTop: '10px' }}>
              <div className="project-contributors-label">Other contributors</div>
              <div className="project-contributor-avatars">
                {project.contributors.map((c, j) => (
                  <div key={j} className="contributor-avatar" style={{ background: c.color }}>
                    {c.initials}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function ProjectsSection({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Projects" guideKey="projects" onGuideOpen={onGuideOpen} />
            <div className="project-list">
              {data.map((project, i) => (
                <ProjectItem key={i} project={project} />
              ))}
            </div>
            <div className="section-footer">
              <button className="section-footer-btn">Show all projects →</button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       VOLUNTEERING SECTION
    ════════════════════════════════════════════ */

    function VolunteeringSection({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Volunteering" guideKey="volunteering" onGuideOpen={onGuideOpen} />
            <div className="vol-list">
              {data.map((vol, i) => (
                <div key={i} className="vol-item">
                  <InitialsAvatar initials={vol.initials} color={vol.color} size={48} shape="square" />
                  <div>
                    <div className="vol-role">{vol.role}</div>
                    <div className="vol-org">{vol.org}</div>
                    <div className="vol-meta">
                      {vol.start} – {vol.end}{vol.duration ? ` · ${vol.duration}` : ''}
                    </div>
                    <span className="vol-cause">{vol.cause}</span>
                    <p className="vol-description">{vol.description}</p>
                  </div>
                </div>
              ))}
            </div>
            <div className="section-footer">
              <button className="section-footer-btn">Show all volunteering →</button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       SKILLS SECTION
    ════════════════════════════════════════════ */

    function SkillsSection({ data, isOwnProfile, onGuideOpen }) {
      const [showAll, setShowAll] = useState(false);

      const categories = [...new Set(data.map(s => s.category))];
      const pinnedSkills = data.filter(s => s.pinned);
      const allSkills = data;
      const visibleSkills = showAll ? allSkills : pinnedSkills;

      const grouped = categories.reduce((acc, cat) => {
        const skills = visibleSkills.filter(s => s.category === cat);
        if (skills.length > 0) acc[cat] = skills;
        return acc;
      }, {});

      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Skills" guideKey="skills" onGuideOpen={onGuideOpen} />
            {Object.entries(grouped).map(([cat, skills]) => (
              <div key={cat} className="skills-category">
                <div className="skills-category-title">{cat}</div>
                {skills.map((skill, i) => (
                  <div key={i} className="skill-item">
                    <div className="skill-left">
                      <span className="skill-name">{skill.name}</span>
                      {skill.verified && <span className="verified-badge">✓ Verified</span>}
                    </div>
                    <span className="endorsement-count">
                      {skill.endorsements} endorsements
                    </span>
                  </div>
                ))}
              </div>
            ))}
            <div className="section-footer">
              <button className="section-footer-btn" onClick={() => setShowAll(!showAll)}>
                {showAll ? 'Show less' : `Show all ${data.length} skills →`}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       RECOMMENDATIONS SECTION
    ════════════════════════════════════════════ */

    function RecommendationCard({ rec }) {
      const [expanded, setExpanded] = useState(false);
      const limit = 240;
      const isLong = rec.text.length > limit;
      return (
        <div className="rec-item">
          <div className="rec-header">
            <InitialsAvatar initials={rec.initials} color={rec.color} size={48} shape="circle" />
            <div className="rec-author-info">
              <div className="rec-author-name">{rec.author}</div>
              <div className="rec-author-title">{rec.title}</div>
            </div>
          </div>
          <div className="rec-date">{rec.date} · {rec.relationship}</div>
          <p className="rec-text">
            {expanded ? rec.text : rec.text.slice(0, limit) + (isLong ? '…' : '')}
          </p>
          {isLong && (
            <button className="show-more-btn" onClick={() => setExpanded(!expanded)}>
              {expanded ? 'see less' : '…see more'}
            </button>
          )}
        </div>
      );
    }

    function RecommendationsSection({ data, isOwnProfile, onGuideOpen }) {
      const [activeTab, setActiveTab] = useState('received');
      const list = activeTab === 'received' ? data.received : data.given;

      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Recommendations" guideKey="recommendations" onGuideOpen={onGuideOpen} />
            <div className="rec-tabs">
              <button
                className={`rec-tab ${activeTab === 'received' ? 'active' : ''}`}
                onClick={() => setActiveTab('received')}
              >
                Received ({data.received.length})
              </button>
              <button
                className={`rec-tab ${activeTab === 'given' ? 'active' : ''}`}
                onClick={() => setActiveTab('given')}
              >
                Given ({data.given.length})
              </button>
            </div>
            <div className="rec-list">
              {list.map((rec, i) => (
                <React.Fragment key={i}>
                  <RecommendationCard rec={rec} />
                  {i < list.length - 1 && <div className="rec-divider" />}
                </React.Fragment>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       LANGUAGES SECTION
    ════════════════════════════════════════════ */

    function LanguagesSection({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Languages" guideKey="languages" onGuideOpen={onGuideOpen} />
            <div className="languages-list">
              {data.map((lang, i) => (
                <div key={i} className="language-item">
                  <span className="language-name">{lang.language}</span>
                  <span className="language-proficiency">{lang.proficiency}</span>
                </div>
              ))}
            </div>
            <div className="section-footer">
              <button className="section-footer-btn">Show all languages →</button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       INTERESTS SECTION
    ════════════════════════════════════════════ */

    function InterestsSection({ data, isOwnProfile, onGuideOpen }) {
      return (
        <div className="card">
          <div className="card-body">
            <SectionHeaderRow title="Interests" guideKey="interests" onGuideOpen={onGuideOpen} />
            <div className="interests-tabs">
              {['Companies','Groups','Newsletters','Schools'].map((tab, i) => (
                <button key={tab} className={`interests-tab${i === 0 ? ' active' : ''}`}>{tab}</button>
              ))}
            </div>
            <div className="interests-grid">
              {data.map((item, i) => (
                <div key={i} className="interest-card">
                  <InitialsAvatar initials={item.initials} color={item.color} size={48} shape="circle" />
                  <div className="interest-info">
                    <div className="interest-name">{item.company}</div>
                    <div className="interest-followers">{item.followers}</div>
                    <button className="btn-follow">+ Follow</button>
                  </div>
                </div>
              ))}
            </div>
            <div className="section-footer">
              <button className="section-footer-btn">Show all interests →</button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       SIDEBAR COMPONENTS
    ════════════════════════════════════════════ */

    function ProfileSidebar({ header, onGuideOpen }) {
      return (
        <>
          {/* Profile language card */}
          <div className="sidebar-card">
            <div className="sidebar-card-title">Profile language</div>
            <div className="sidebar-row">
              <span className="sidebar-row-label">English</span>
            </div>
          </div>

          {/* Public profile & URL card */}
          <div className="sidebar-card">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '6px' }}>
              <div className="sidebar-card-title" style={{ margin: 0 }}>Public profile &amp; URL</div>
              {onGuideOpen && <GuideBadge sectionKey="customUrl" onOpen={onGuideOpen} />}
            </div>
            <div className="sidebar-row">
              <span style={{ fontSize: '13px', color: 'var(--blue)' }}>
                linkedin.com/in/{(header.name || '').toLowerCase().replace(/\s+/g, '')}
              </span>
            </div>
          </div>

          {/* Analytics card */}
          <div className="sidebar-analytics">
            <div className="analytics-title">Analytics</div>
            <div className="analytics-desc">Private to you</div>
            <div className="analytics-row">
              <span className="analytics-icon">👁️</span>
              <div>
                <div className="analytics-num">42</div>
                <div className="analytics-label">Profile views in last 7 days</div>
              </div>
            </div>
            <div className="analytics-row">
              <span className="analytics-icon">📈</span>
              <div>
                <div className="analytics-num">127</div>
                <div className="analytics-label">Post impressions in last 30 days</div>
              </div>
            </div>
            <div className="analytics-row">
              <span className="analytics-icon">🔍</span>
              <div>
                <div className="analytics-num">18</div>
                <div className="analytics-label">Search appearances this week</div>
              </div>
            </div>
          </div>

          {/* Open to work card */}
          <div className="sidebar-card" style={{ borderLeft: '4px solid #057642' }}>
            <div className="analytics-title" style={{ color: '#057642' }}>Open to Work</div>
            <div className="analytics-desc">
              Data Analyst, Business Analyst, Junior BI Developer roles<br />
              <strong>Toronto, ON · Remote · Hybrid</strong>
            </div>
            <button className="btn btn-outline" style={{ marginTop: '8px', fontSize: '13px', padding: '4px 14px' }}>
              Show details
            </button>
          </div>
        </>
      );
    }

    /* ════════════════════════════════════════════
       APP ROOT
    ════════════════════════════════════════════ */

    function App() {
      const isOwnProfile = profileData.header.isOwnProfile;
      const [activeGuide, setActiveGuide] = useState(null);
      const openGuide  = key => setActiveGuide(key);
      const closeGuide = ()  => setActiveGuide(null);

      return (
        <div className="linkedin-app">
          <GuideDrawer sectionKey={activeGuide} onClose={closeGuide} />
          {/* Full-width profile header */}
          <ProfileHeader data={profileData.header} isOwnProfile={isOwnProfile} onGuideOpen={openGuide} />

          {/* Two-column layout */}
          <div className="profile-layout">
            {/* Main column */}
            <div className="profile-main">
              <AboutSection
                data={profileData.about}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <FeaturedSection
                data={profileData.featured}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <ActivitySection
                data={profileData.activity}
                header={profileData.header}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <ExperienceSection
                data={profileData.experience}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <EducationSection
                data={profileData.education}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <CertificationsSection
                data={profileData.certifications}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <ProjectsSection
                data={profileData.projects}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <VolunteeringSection
                data={profileData.volunteering}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <SkillsSection
                data={profileData.skills}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <RecommendationsSection
                data={profileData.recommendations}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <LanguagesSection
                data={profileData.languages}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
              <InterestsSection
                data={profileData.interests}
                isOwnProfile={isOwnProfile}
                onGuideOpen={openGuide}
              />
            </div>

            {/* Sidebar column */}
            <div className="profile-sidebar">
              <ProfileSidebar header={profileData.header} onGuideOpen={openGuide} />
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       RENDER
    ════════════════════════════════════════════ */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
